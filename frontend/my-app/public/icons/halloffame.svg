<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   xmlns="http://www.w3.org/2000/svg"
   viewBox="0 0 512 512"
   width="512"
   height="512"
   version="1.1">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff16b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffd321;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffaf00;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Crown Base -->
  <path
     d="M 80 320 L 120 180 L 180 220 L 256 140 L 332 220 L 392 180 L 432 320 Z"
