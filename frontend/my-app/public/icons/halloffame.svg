  <line x1="130" y1="415" x2="382" y2="415" stroke="#ffd321" stroke-width="2" />
  <line x1="130" y1="435" x2="382" y2="435" stroke="#ffd321" stroke-width="2" />

  <!-- Small Stars Around Crown -->
  <path d="M 50 250 L 54 258 L 63 259 L 56 265 L 58 274 L 50 269 L 42 274 L 44 265 L 37 259 L 46 258 Z" fill="#fff16b" />
  <path d="M 462 250 L 466 258 L 475 259 L 468 265 L 470 274 L 462 269 L 454 274 L 456 265 L 449 259 L 458 258 Z" fill="#fff16b" />
  <path d="M 90 120 L 94 128 L 103 129 L 96 135 L 98 144 L 90 139 L 82 144 L 84 135 L 77 129 L 86 128 Z" fill="#fff16b" />
  <path d="M 422 120 L 426 128 L 435 129 L 428 135 L 430 144 L 422 139 L 414 144 L 416 135 L 409 129 L 418 128 Z" fill="#fff16b" />
</svg>
