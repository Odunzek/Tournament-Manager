  <!-- Decorative Gems on Crown Band -->
  <circle cx="150" cy="350" r="12" fill="#ff6b6b" stroke="#fff" stroke-width="2" />
  <circle cx="220" cy="350" r="12" fill="#4ecdc4" stroke="#fff" stroke-width="2" />
  <circle cx="256" cy="350" r="15" fill="#95e1d3" stroke="#fff" stroke-width="2" />
  <circle cx="292" cy="350" r="12" fill="#4ecdc4" stroke="#fff" stroke-width="2" />
  <circle cx="362" cy="350" r="12" fill="#ff6b6b" stroke="#fff" stroke-width="2" />

  <!-- Ribbon/Banner at Bottom -->
  <path
     d="M 120 400 L 100 480 L 140 460 L 180 490 L 200 400 Z"
     fill="#e74c3c"
     stroke="#c0392b"
     stroke-width="3" />
  <path
     d="M 312 400 L 332 490 L 372 460 L 412 480 L 392 400 Z"
     fill="#e74c3c"
     stroke="#c0392b"
     stroke-width="3" />

  <!-- Text Banner -->
  <rect x="120" y="400" width="272" height="50" fill="#2c3e50" stroke="#34495e" stroke-width="3" />
  <rect x="120" y="410" width="272" height="15" fill="#34495e" opacity="0.6" />

