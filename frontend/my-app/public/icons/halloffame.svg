  <circle cx="120" cy="180" r="25" fill="#fff16b" stroke="#ffd321" stroke-width="4" />
  <circle cx="180" cy="220" r="25" fill="#fff16b" stroke="#ffd321" stroke-width="4" />
  <circle cx="256" cy="140" r="30" fill="#fff16b" stroke="#ffd321" stroke-width="4" />
  <circle cx="332" cy="220" r="25" fill="#fff16b" stroke="#ffd321" stroke-width="4" />
  <circle cx="392" cy="180" r="25" fill="#fff16b" stroke="#ffd321" stroke-width="4" />

  <!-- Crown Band -->
  <rect x="80" y="320" width="352" height="60" fill="#ffd321" stroke="#ffaf00" stroke-width="6" />
  <rect x="80" y="340" width="352" height="20" fill="#ffaf00" opacity="0.5" />

  <!-- Center Star -->
  <path
     d="M 256 200 L 270 235 L 308 240 L 282 265 L 289 303 L 256 285 L 223 303 L 230 265 L 204 240 L 242 235 Z"
     fill="#fff"
