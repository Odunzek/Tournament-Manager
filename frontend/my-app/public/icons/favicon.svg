  <polygon points="26,42 28.5,37 35.5,37 38,42 35,47" fill="#1e293b"/>
  <!-- Seam lines -->
  <line x1="32" y1="18" x2="32" y2="14" stroke="#1e293b" stroke-width="0.8"/>
  <line x1="37.5" y1="22" x2="42" y2="19" stroke="#1e293b" stroke-width="0.8"/>
  <line x1="26.5" y1="22" x2="22" y2="19" stroke="#1e293b" stroke-width="0.8"/>
  <line x1="45" y1="36" x2="49" y2="35" stroke="#1e293b" stroke-width="0.8"/>
  <line x1="19" y1="36" x2="15" y2="35" stroke="#1e293b" stroke-width="0.8"/>
  <line x1="41" y1="41" x2="44" y2="45" stroke="#1e293b" stroke-width="0.8"/>
  <line x1="23" y1="41" x2="20" y2="45" stroke="#1e293b" stroke-width="0.8"/>
  <line x1="35" y1="47" x2="35" y2="50" stroke="#1e293b" stroke-width="0.8"/>
  <line x1="29" y1="47" x2="29" y2="50" stroke="#1e293b" stroke-width="0.8"/>
</svg>
